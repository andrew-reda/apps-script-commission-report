<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Executive Commission Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css" rel="stylesheet"/>
<style>
:root{
  --bg:#0f1117;--card:#1a1d27;--card2:#21253a;
  --accent:#4f7cff;--accent2:#7c5cff;--green:#22c55e;
  --red:#ef4444;--amber:#f59e0b;--text:#e2e8f0;
  --muted:#8892a4;--border:#2a2f45;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:0 36px;display:flex;align-items:stretch;justify-content:space-between;position:sticky;top:0;z-index:200;min-height:80px}
.header-left{display:flex;align-items:center}
.logo-wrap{display:flex;align-items:center;justify-content:center;padding:0 28px 0 0;margin-right:28px;border-right:1px solid var(--border);min-height:80px}
.logo-img{height:62px;width:auto;object-fit:contain}
.header-titles{display:flex;flex-direction:column;justify-content:center;gap:4px}
.header-main{font-size:1.2rem;font-weight:700;letter-spacing:.2px;color:var(--text)}
.header-sub{font-size:.8rem;color:var(--muted);font-weight:400;letter-spacing:.3px}
.period-badge{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 18px;font-size:.8rem;color:var(--muted);letter-spacing:.4px;align-self:center}
.ts-wrapper{min-width:0;width:100%}
.ts-control{background:var(--card2)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:8px!important;padding:5px 8px!important;font-size:.8rem!important;cursor:pointer!important;box-shadow:none!important;min-height:36px!important;flex-wrap:wrap;gap:4px}
.ts-control input{color:var(--text)!important;background:transparent!important;font-size:.8rem!important}
.ts-control .item{background:var(--accent)!important;color:#fff!important;border-radius:5px!important;padding:2px 8px!important;font-size:.75rem!important;border:none!important;display:flex;align-items:center;gap:4px}
.ts-control .item .remove{color:rgba(255,255,255,.7)!important;font-size:14px!important;border-left:1px solid rgba(255,255,255,.3)!important;margin-left:4px;padding-left:4px}
.ts-control .item .remove:hover{color:#fff!important}
.ts-dropdown{background:var(--card2)!important;border:1px solid var(--border)!important;border-radius:8px!important;margin-top:4px!important;font-size:.8rem!important;box-shadow:0 8px 24px rgba(0,0,0,.5)!important;z-index:9999!important}
.ts-dropdown .option{color:var(--text)!important;padding:8px 12px!important;display:flex;align-items:center;gap:8px}
.ts-dropdown .option::before{content:'';width:14px;height:14px;border:1px solid var(--border);border-radius:3px;flex-shrink:0;background:var(--card)}
.ts-dropdown .option.selected::before{background:var(--accent);border-color:var(--accent);content:'✓';color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center}
.ts-dropdown .option:hover,.ts-dropdown .option.active{background:rgba(79,124,255,.15)!important}
.ts-dropdown input.ts-dropdown-search-input{background:var(--bg)!important;color:var(--text)!important;border:none!important;border-bottom:1px solid var(--border)!important;border-radius:0!important;padding:8px 12px!important;width:100%!important;font-size:.8rem!important;outline:none!important}
.ts-dropdown .no-results{color:var(--muted)!important;padding:8px 12px!important}
.ts-wrapper.focus .ts-control{border-color:var(--accent)!important;box-shadow:0 0 0 2px rgba(79,124,255,.2)!important}
.plugin-clear_button .clear-button{color:var(--muted)!important;font-size:16px!important}
#filters{background:var(--card);border-bottom:1px solid var(--border);padding:12px 36px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:160px;flex:1;max-width:260px}
.filter-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
#clearBtn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 16px;font-size:.8rem;cursor:pointer;white-space:nowrap;align-self:flex-end;transition:border-color .2s,color .2s}
#clearBtn:hover{border-color:var(--accent);color:var(--text)}
main{padding:24px 36px;max-width:1600px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
@media(max-width:1000px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--kpi-color,var(--accent))}
.kpi-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:10px;font-weight:600}
.kpi-value{font-size:1.75rem;font-weight:700;letter-spacing:-.5px;line-height:1}
.kpi-sub{font-size:.72rem;color:var(--muted);margin-top:8px}
.chart-row{display:grid;grid-template-columns:.9fr 1.2fr .9fr;gap:20px;margin-bottom:24px}
@media(max-width:900px){.chart-row{grid-template-columns:1fr}}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;height:520px;display:flex;flex-direction:column}
.chart-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:18px;font-weight:600;flex-shrink:0}
.donut-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0}
.donut-wrap canvas{max-height:240px;width:100%!important}
.legend-box{flex-shrink:0;margin-top:14px;width:100%}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.legend-item{display:flex;align-items:center;gap:6px;cursor:default;min-width:0}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend-label{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.legend-label:hover{color:var(--text)}
.legend-toggle{margin-top:8px;background:none;border:none;color:var(--accent);font-size:.72rem;cursor:pointer;padding:2px 0;text-align:left;letter-spacing:.2px}
.legend-toggle:hover{text-decoration:underline}
.mix-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;flex-shrink:0}
.mix-pill{background:var(--card2);border-radius:20px;padding:4px 12px;font-size:.72rem;display:flex;align-items:center;gap:6px}
.mix-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.agent-table-wrap{overflow-y:auto;overflow-x:hidden;flex:1;min-height:0;border-radius:8px}
.agent-table-wrap::-webkit-scrollbar{width:4px}
.agent-table-wrap::-webkit-scrollbar-track{background:transparent}
.agent-table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
table{width:100%;border-collapse:collapse;font-size:.78rem}
thead{position:sticky;top:0;z-index:2;background:var(--card)}
th{text-align:left;padding:8px 10px;color:var(--muted);font-weight:500;font-size:.68rem;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap}
tr:hover td{background:var(--card2)}
.bar-track{background:var(--border);border-radius:4px;height:5px;width:100%}
.bar-fill{height:5px;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
footer{text-align:center;padding:20px 36px;border-top:1px solid var(--border);font-size:.78rem;color:var(--muted);margin-top:8px}
footer a{color:var(--accent);text-decoration:none;font-weight:500}
footer a:hover{text-decoration:underline}
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{color:var(--muted);font-size:.9rem}
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div class="load-text">Loading commission data…</div>
</div>

<header>
  <div class="header-left">
    <div class="logo-wrap">
      <img id="logoImg" class="logo-img" src="" alt="" onerror="this.style.display='none'"/>
    </div>
    <div class="header-titles">
      <div class="header-main">Executive Commission Report</div>
      <div id="headerSub" class="header-sub"></div>
    </div>
  </div>
  <div class="period-badge" id="periodBadge">—</div>
</header>

<div id="filters">
  <div class="filter-group">
    <div class="filter-label">Agent</div>
    <select id="fAgent" multiple placeholder="All Agents"></select>
  </div>
  <div class="filter-group">
    <div class="filter-label">Carrier</div>
    <select id="fCarrier" multiple placeholder="All Carriers"></select>
  </div>
  <div class="filter-group">
    <div class="filter-label">Classification</div>
    <select id="fClassif" multiple placeholder="All Classifications"></select>
  </div>
  <button id="clearBtn" onclick="clearFilters()">&#x2715; Clear all</button>
</div>

<main>
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="chart-row">
    <div class="chart-card">
      <div class="chart-title">Commission by carrier</div>
      <div class="donut-wrap"><canvas id="carrierChart"></canvas></div>
      <div class="legend-box">
        <div class="legend-grid" id="carrierLegend"></div>
        <button class="legend-toggle" id="legendToggleBtn" onclick="toggleLegend()"></button>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Agent performance ranking</div>
      <div class="agent-table-wrap" id="agentTable"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Business mix by classification</div>
      <div class="donut-wrap"><canvas id="mixChart"></canvas></div>
      <div class="mix-row" id="mixLabels"></div>
    </div>
  </div>
</main>

<footer>
  Created by <a href="https://nas.io/expert-services" target="_blank" rel="noopener">ComTrack Expert Services</a>
</footer>

<script>
// ============================================================
//  CONFIGURATION — update these 3 values for each new agency
// ============================================================
var LOGO_ID     = "1M5vLbZcrkGKZwqs3ZROrc1Nok1hWLbcG";  // paste only the Drive file ID here
var LOGO_URL    = "https://drive.google.com/thumbnail?id=" + LOGO_ID + "&sz=w300";  //Thumbnail Link, dont edit
var AGENCY_NAME = "Insurance Agency LLC";
var AGENCY_SUB  = "Reaching Your Insurance and Financial Objectives";
// ============================================================

// Apply config immediately — no need to wait for data
document.getElementById("logoImg").src          = LOGO_URL;
document.getElementById("logoImg").alt          = AGENCY_NAME;
document.getElementById("headerSub").textContent = AGENCY_NAME + " · " + AGENCY_SUB;

var RAW = [], CHARTS = {}, TS = {};
var carrierLegendItems = [], legendExpanded = false;
var LEGEND_DEFAULT = 4;
var PERIOD = "";

var PALETTE = [
  "#06b6d4","#a78bfa","#22c55e","#f59e0b","#ef4444",
  "#4f7cff","#fb923c","#f472b6","#34d399","#fbbf24",
  "#60a5fa","#c084fc","#4ade80","#f87171","#818cf8"
];

window.addEventListener("load", function() {
  google.script.run
    .withSuccessHandler(init)
    .withFailureHandler(function(e){ document.querySelector(".load-text").textContent = "Error: " + e.message; })
    .getDashboardData();
});

function init(data) {
  if (data.error) { document.querySelector(".load-text").textContent = data.error; return; }
  PERIOD = data.paymentPeriod;
  document.getElementById("periodBadge").textContent = PERIOD;
  RAW = data.rawRecords;
  populateFilters(data.filters);
  document.getElementById("loader").style.display = "none";
  renderAll(data);
}

function populateFilters(f) {
  buildTS("fAgent",   f.agents,   "Search agents...");
  buildTS("fCarrier", f.carriers, "Search carriers...");
  buildTS("fClassif", f.classifs, "Search classifications...");
}

function buildTS(id, items, ph) {
  if (TS[id]) TS[id].destroy();
  var sel = document.getElementById(id);
  sel.innerHTML = "";
  items.forEach(function(v){ var o=document.createElement("option"); o.value=o.textContent=v; sel.appendChild(o); });
  TS[id] = new TomSelect("#"+id,{
    plugins:["remove_button","checkbox_options","clear_button"],
    placeholder:ph, allowEmptyOption:false, maxOptions:500,
    closeAfterSelect:false, hideSelected:false,
    onItemAdd:function(){applyFilters();},
    onItemRemove:function(){applyFilters();},
    onClear:function(){applyFilters();}
  });
}

function clearFilters() {
  Object.values(TS).forEach(function(ts){ts.clear(true);});
  applyFilters();
}

function applyFilters() {
  var agS=new Set(TS["fAgent"]  ?TS["fAgent"].getValue()  :[]);
  var caS=new Set(TS["fCarrier"]?TS["fCarrier"].getValue():[]);
  var clS=new Set(TS["fClassif"]?TS["fClassif"].getValue():[]);
  var filtered=RAW.filter(function(r){
    return(!agS.size||agS.has(r.agent))&&(!caS.size||caS.has(r.carrier))&&(!clS.size||clS.has(r.classif));
  });
  renderAll(buildData(filtered));
}

function buildData(records) {
  function agg(key){
    var m={};
    records.forEach(function(r){var k=r[key]||"Unknown";m[k]=(m[k]||0)+r.commission;});
    return Object.entries(m).sort(function(a,b){return b[1]-a[1];}).map(function(e){return{label:e[0],value:e[1]};});
  }
  var total        =records.reduce(function(s,r){return s+r.commission;},0);
  var totalPayroll =records.reduce(function(s,r){return s+r.agentPayroll;},0);
  var revLeakage   =records.filter(function(r){return r.commission<0;}).reduce(function(s,r){return s+r.commission;},0);
  var newBizCount  =records.filter(function(r){return r.classif==="Advance";}).length;
  var uniqueClients=new Set(records.map(function(r){return r.clientName;}).filter(Boolean)).size;
  var classifComm={};
  records.forEach(function(r){var c=r.classif||"Unknown";classifComm[c]=(classifComm[c]||0)+r.commission;});
  var classifMix=Object.entries(classifComm).sort(function(a,b){return b[1]-a[1];}).map(function(e){return{label:e[0],value:e[1]};});
  return{
    meta:{total:total,totalPayroll:totalPayroll,revLeakage:revLeakage,newBizCount:newBizCount,uniqueClients:uniqueClients},
    byCarrier:agg("carrier").slice(0,14),
    byAgent:  agg("agent").slice(0,20),
    classifMix:classifMix
  };
}

function renderAll(data) {
  renderKPIs(data.meta);
  renderCarrierDonut(data.byCarrier);
  renderAgentTable(data.byAgent, data.meta.total);
  renderMix(data.classifMix);
}

function renderKPIs(m) {
  function fmtK(v){var abs=Math.abs(v);var s=abs>=1000?"$"+(abs/1000).toFixed(1)+"K":"$"+abs.toFixed(0);return v<0?"-"+s:s;}
  var kpis=[
    {label:"Total Commission",value:fmtK(m.total),                   color:"#4f7cff",sub:PERIOD},
    {label:"Total Payroll",   value:fmtK(m.totalPayroll),             color:"#7c5cff",sub:"Agents Payroll"},
    {label:"Book of Business",value:m.uniqueClients.toLocaleString(), color:"#06b6d4",sub:"Unique active clients"},
    {label:"New Business",    value:m.newBizCount.toLocaleString(),    color:"#22c55e",sub:"Classified as Advance"},
    {label:"Revenue Leakage", value:fmtK(m.revLeakage),               color:"#ef4444",sub:"Chargebacks & Fees"}
  ];
  document.getElementById("kpiGrid").innerHTML=kpis.map(function(k){
    return '<div class="kpi" style="--kpi-color:'+k.color+'">'+
      '<div class="kpi-label">'+k.label+'</div>'+
      '<div class="kpi-value" style="color:'+k.color+'">'+k.value+'</div>'+
      '<div class="kpi-sub">'+k.sub+'</div></div>';
  }).join("");
}

function renderCarrierDonut(items) {
  carrierLegendItems=items; legendExpanded=false; renderCarrierLegend();
  destroyChart("carrierChart");
  CHARTS["carrierChart"]=new Chart(document.getElementById("carrierChart").getContext("2d"),{
    type:"doughnut",
    data:{labels:items.map(function(i){return i.label;}),datasets:[{data:items.map(function(i){return i.value;}),backgroundColor:PALETTE,borderColor:"#1a1d27",borderWidth:2,hoverOffset:8}]},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return" $"+(c.raw/1000).toFixed(1)+"K";}}}}}
  });
}

function renderCarrierLegend() {
  var items=legendExpanded?carrierLegendItems:carrierLegendItems.slice(0,LEGEND_DEFAULT);
  document.getElementById("carrierLegend").innerHTML=items.map(function(it,i){
    return '<div class="legend-item" title="'+it.label+'">'+
      '<div class="legend-dot" style="background:'+PALETTE[i%PALETTE.length]+'"></div>'+
      '<span class="legend-label">'+it.label+'</span></div>';
  }).join("");
  var btn=document.getElementById("legendToggleBtn");
  if(carrierLegendItems.length<=LEGEND_DEFAULT){btn.style.display="none";}
  else{btn.style.display="block";btn.textContent=legendExpanded?"- Show less":"+ Show all "+carrierLegendItems.length+" carriers";}
}

function toggleLegend(){legendExpanded=!legendExpanded;renderCarrierLegend();}

function renderMix(items) {
  destroyChart("mixChart");
  CHARTS["mixChart"]=new Chart(document.getElementById("mixChart").getContext("2d"),{
    type:"doughnut",
    data:{labels:items.map(function(i){return i.label;}),datasets:[{data:items.map(function(i){return i.value;}),backgroundColor:PALETTE,borderColor:"#1a1d27",borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return" "+c.label+": $"+(c.raw/1000).toFixed(1)+"K";}}}}}
  });
  document.getElementById("mixLabels").innerHTML=items.map(function(it,i){
    return '<div class="mix-pill"><div class="mix-dot" style="background:'+PALETTE[i%PALETTE.length]+'"></div>'+
      it.label+': <strong>$'+(it.value/1000).toFixed(1)+'K</strong></div>';
  }).join("");
}

function renderAgentTable(agents,grandTotal) {
  var maxV=Math.abs(agents[0]?agents[0].value:1)||1;
  var rows=agents.map(function(a,i){
    var pct=grandTotal?(a.value/grandTotal*100).toFixed(1):"0.0";
    var barW=(Math.abs(a.value)/maxV*100).toFixed(0);
    var val=(a.value<0?"-":"")+"$"+(Math.abs(a.value)/1000).toFixed(1)+"K";
    var col=a.value<0?"var(--red)":"var(--text)";
    return "<tr>"+
      '<td style="color:var(--muted);width:28px">'+(i+1)+"</td>"+
      '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">'+a.label+"</td>"+
      '<td style="color:'+col+';font-weight:500">'+val+"</td>"+
      '<td style="color:var(--muted)">'+pct+"%</td>"+
      '<td style="width:80px"><div class="bar-track"><div class="bar-fill" style="width:'+barW+'%"></div></div></td>'+
      "</tr>";
  }).join("");
  document.getElementById("agentTable").innerHTML=
    "<table><thead><tr><th>#</th><th>Agent</th><th>Commission</th><th>Share</th><th>Rel.</th></tr></thead><tbody>"+rows+"</tbody></table>";
}

function destroyChart(id){if(CHARTS[id]){CHARTS[id].destroy();delete CHARTS[id];}}
</script>
</body>
</html>
